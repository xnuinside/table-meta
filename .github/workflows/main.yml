name: Tests Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox
    - name: Run lint
      run: tox -e lint

  tests:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      matrix:
        include:
          - python: "3.9"
            toxenv: py39
          - python: "3.10"
            toxenv: py310
          - python: "3.11"
            toxenv: py311
          - python: "3.12"
            toxenv: py312
          - python: "3.13"
            toxenv: py313
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tox
    - name: Test with tox
      run: tox -e ${{ matrix.toxenv }}
